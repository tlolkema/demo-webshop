<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Fruit Shop - Fresh Fruits Online</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header role="banner">
      <div class="header-center">
        <a href="index.html" class="logo" aria-label="Go to homepage">
          <img
            src="img/fruit-shop-logo.png"
            class="logo-img"
            alt="Fruit Shop Logo"
          />
          <span class="products-text"> View Products </span>
        </a>
        <nav role="navigation" aria-label="Main navigation">
          <a
            href="basket.html"
            class="basket-link"
            aria-label="View shopping basket"
          >
            <img
              src="img/basket-icon.png"
              class="basket-img"
              alt="Shopping basket icon"
            />
            <span class="basket-text">View shopping basket</span>
          </a>
        </nav>
      </div>
    </header>
    <main id="main-content" role="main">
      <h1 class="products-title">Products</h1>
      <div class="game-status" id="gameStatus"></div>
      <ul class="emoji-list" role="list" aria-label="Product list">
        <li>
          <a
            href="product-apple.html"
            class="emoji-box"
            aria-label="View Apple product details"
            >🍏</a
          >
          <a href="product-apple.html">Go to Apple</a>
        </li>
        <li>
          <a
            href="product-banana.html"
            class="emoji-box"
            aria-label="View Banana product details"
            >🍌</a
          >
          <a href="product-banana.html">Go to Banana</a>
        </li>
        <li>
          <a
            href="product-lemon.html"
            class="emoji-box"
            aria-label="View Lemon product details"
            >🍋</a
          >
          <a href="product-lemon.html">Go to Lemon</a>
        </li>
        <li>
          <a
            href="product-tree.html"
            class="emoji-box"
            aria-label="View Banana Tree product details"
            >🌴</a
          >
          <a href="product-tree.html">Go to Banana Tree</a>
        </li>
      </ul>
    </main>
    <footer>
      <a
        href="https://www.linkedin.com/in/timlolkema/"
        target="_blank"
        rel="noopener noreferrer"
      >
        By Tim Lolkema
      </a>
    </footer>
    <script src="shop.js"></script>
    <script>
      // Display game status on index page
      const gameState = getGameState();
      const statusDiv = document.getElementById("gameStatus");
      
      if (!gameState.hasCompletedGame) {
        const opponent = OPPONENTS[gameState.level];
        statusDiv.innerHTML = `
          <div class="game-info">
            <p class="level-text">⚔️ Current Level: ${gameState.level}/5</p>
            <p class="opponent-text">Next Battle: ${opponent.emoji} ${opponent.name}</p>
            <p class="hp-text">Your HP: ${gameState.playerHealth}/${gameState.maxPlayerHealth}</p>
            <button onclick="resetGameAndRefresh()" class="reset-game-btn">🔄 Reset Game</button>
          </div>
        `;
      } else {
        statusDiv.innerHTML = `
          <div class="game-info victory-banner">
            <p class="victory-banner-text">🏆 Level 5 Completed! You can now shop freely! 🏆</p>
            <button onclick="resetGameAndRefresh()" class="reset-game-btn">🔄 Reset Game</button>
          </div>
        `;
      }
      
      function resetGameAndRefresh() {
        if (confirm("Are you sure you want to reset your game progress?")) {
          resetGame();
          location.reload();
        }
      }
    </script>
  </body>
</html>
