<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Cat Breeds Shop - Premium Cat Breeds</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header role="banner">
      <div class="header-center">
        <a href="index.html" class="logo" aria-label="Go to homepage">
          <img
            src="img/fruit-shop-logo.png"
            class="logo-img"
            alt="Cat Breeds Shop Logo"
          />
          <span class="products-text"> View Products </span>
        </a>
        <nav role="navigation" aria-label="Main navigation">
          <a
            href="basket.html"
            class="basket-link"
            aria-label="View shopping basket"
          >
            <img
              src="img/basket-icon.png"
              class="basket-img"
              alt="Shopping basket icon"
            />
            <span class="basket-text">View shopping basket</span>
          </a>
        </nav>
      </div>
    </header>
    <main id="main-content" role="main">
      <div class="products-header">
        <h1 class="products-title">Fruits & Smoothies</h1>
        <button id="requestProductBtn" class="request-btn" aria-label="Request a custom product">📝 Request Product</button>
      </div>
      <ul class="emoji-list" role="list" aria-label="Product list">
        <li>
          <a href="product-apple.html" class="emoji-box" aria-label="View Apple product details">🍎</a>
          <a href="product-apple.html">Go to Apple</a>
        </li>
        <li>
          <a href="product-banana.html" class="emoji-box" aria-label="View Banana product details">🍌</a>
          <a href="product-banana.html">Go to Banana</a>
        </li>
        <li>
          <a href="product-lemon.html" class="emoji-box" aria-label="View Lemon product details">🍋</a>
          <a href="product-lemon.html">Go to Lemon</a>
        </li>
      </ul>
      <!-- Product Request Modal -->
      <div id="requestModal" class="modal" role="dialog" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-content">
          <div class="modal-header">
            <h2 id="modalTitle">Request a Product</h2>
            <button id="closeModal" class="close-btn" aria-label="Close modal">&times;</button>
          </div>
          <form id="requestForm" role="form">
            <div class="form-group">
              <label for="productName">Product Name *</label>
              <input type="text" id="productName" name="productName" required aria-required="true" placeholder="e.g., Siamese Cat" />
            </div>
            <div class="form-group">
              <label for="productDesc">Description</label>
              <textarea id="productDesc" name="productDesc" placeholder="Tell us more about what you're looking for..." rows="4"></textarea>
            </div>
            <div class="form-group">
              <label for="productLink">Reference Link</label>
              <input type="url" id="productLink" name="productLink" placeholder="https://example.com" />
            </div>
            <button type="submit" class="submit-btn">Add to Basket</button>
          </form>
        </div>
      </div>
    </main>
    <footer>
      <a
        href="https://www.linkedin.com/in/timlolkema/"
        target="_blank"
        rel="noopener noreferrer"
      >
        By Tim Lolkema
      </a>
    </footer>
    <script src="shop.js"></script>
  </body>
</html>
