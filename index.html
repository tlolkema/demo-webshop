<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Fruit Shop - Fresh Fruits Online</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header role="banner">
      <div class="header-center">
        <a href="index.html" class="logo" aria-label="Go to homepage">
          <img
            src="img/fruit-shop-logo.png"
            class="logo-img"
            alt="Fruit Shop Logo"
          />
          <span class="products-text"> View Products </span>
        </a>
        <nav role="navigation" aria-label="Main navigation">
          <a
            href="basket.html"
            class="basket-link"
            aria-label="View shopping basket"
          >
            <img
              src="img/basket-icon.png"
              class="basket-img"
              alt="Shopping basket icon"
            />
            <span class="basket-text">View shopping basket</span>
          </a>
        </nav>
      </div>
    </header>
    <main id="main-content" role="main">
      <h1 class="products-title">Products</h1>
      <div class="category-tabs" role="tablist" aria-label="Product categories">
        <button class="category-tab active" data-category="fruits" role="tab" aria-selected="true">
          Fruits
        </button>
        <button class="category-tab" data-category="vegetables" role="tab" aria-selected="false">
          Vegetables
        </button>
      </div>
      <section id="fruits-category" class="product-category">
        <h2 class="category-heading">Fruits</h2>
        <ul class="emoji-list" role="list" aria-label="Fruit products">
          <li>
            <a
              href="product-apple.html"
              class="emoji-box"
              aria-label="View Apple product details"
              >🍏</a
            >
            <a href="product-apple.html">Go to Apple</a>
          </li>
          <li>
            <a
              href="product-banana.html"
              class="emoji-box"
              aria-label="View Banana product details"
              >🍌</a
            >
            <a href="product-banana.html">Go to Banana</a>
          </li>
          <li>
            <a
              href="product-lemon.html"
              class="emoji-box"
              aria-label="View Lemon product details"
              >🍋</a
            >
            <a href="product-lemon.html">Go to Lemon</a>
          </li>
          <li>
            <a
              href="product-tomato.html"
              class="emoji-box"
              aria-label="View Tomato product details"
              >🍅</a
            >
            <a href="product-tomato.html">Go to Tomato</a>
          </li>
        </ul>
      </section>
      <section id="vegetables-category" class="product-category hidden">
        <h2 class="category-heading">Vegetables</h2>
        <ul class="emoji-list" role="list" aria-label="Vegetable products">
          <li>
            <a
              href="product-cucumber.html"
              class="emoji-box"
              aria-label="View Cucumber product details"
              >🥒</a
            >
            <a href="product-cucumber.html">Go to Cucumber</a>
          </li>
          <li>
            <a
              href="product-avocado.html"
              class="emoji-box"
              aria-label="View Avocado product details"
              >🥑</a
            >
            <a href="product-avocado.html">Go to Avocado</a>
          </li>
          <li>
            <a
              href="product-tomato.html"
              class="emoji-box"
              aria-label="View Tomato product details"
              >🍅</a
            >
            <a href="product-tomato.html">Go to Tomato</a>
          </li>
        </ul>
      </section>
    </main>
    <footer>
      <a
        href="https://www.linkedin.com/in/timlolkema/"
        target="_blank"
        rel="noopener noreferrer"
      >
        By Tim Lolkema
      </a>
    </footer>
    <script src="shop.js"></script>
  </body>
</html>
