<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fruit Slot Machine - Fruit Shop</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .slot-container { display:flex; flex-direction:column; align-items:center; gap:16px; }
      .slot-reel { font-size:64px; height:88px; display:flex; align-items:center; justify-content:center; }
      .spin-btn { padding:10px 18px; font-size:16px; }
      .result { margin-top:8px; font-weight:600; }
    </style>
  </head>
  <body>
    <header role="banner">
      <div class="header-center">
        <a href="index.html" class="logo" aria-label="Go to homepage">
          <img
            src="img/fruit-shop-logo.png"
            class="logo-img"
            alt="Fruit Shop Logo"
          />
          <span class="products-text"> View Products </span>
        </a>
        <nav role="navigation" aria-label="Main navigation">
          <a
            href="basket.html"
            class="basket-link"
            aria-label="View shopping basket"
          >
            <img
              src="img/basket-icon.png"
              class="basket-img"
              alt="Shopping basket icon"
            />
            <span class="basket-text">View shopping basket</span>
          </a>
        </nav>
      </div>
    </header>
    <main id="main-content" role="main">
      <div class="content-box slot-container">
        <div class="emoji-display" role="img" aria-label="Slot machine emoji">🎰</div>
        <h1>Slot Machine</h1>
        <div class="product-desc" aria-label="Slot description">
          Spin the reel to get a random fruit added to your basket.
        </div>
        <div class="slot-reel" id="slotReel">🍏</div>
        <div>
          <button id="spinBtn" class="spin-btn">Add to Basket</button>
        </div>
        <div class="result" id="slotResult" aria-live="polite"></div>
      </div>
    </main>
    <footer>
      <a
        href="https://www.linkedin.com/in/timlolkema/"
        target="_blank"
        rel="noopener noreferrer"
      >
        By Tim Lolkema
      </a>
    </footer>
    <script src="shop.js"></script>
    <script>
      // Read available product keys from PRODUCTS
      const FRUIT_KEYS = Object.keys(PRODUCTS);
      const FRUIT_EMOJIS = FRUIT_KEYS.map((k) => PRODUCTS[k].emoji || "?");
      const reel = document.getElementById('slotReel');
      const result = document.getElementById('slotResult');
      const spinBtn = document.getElementById('spinBtn');

      function pickRandomFruitKey(){
        const i = Math.floor(Math.random() * FRUIT_KEYS.length);
        return FRUIT_KEYS[i];
      }

      function animateReel(duration = 1200){
        const start = Date.now();
        return new Promise((resolve) => {
          function frame(){
            const elapsed = Date.now() - start;
            // cycle emoji rapidly
            const idx = Math.floor((elapsed / 80)) % FRUIT_EMOJIS.length;
            reel.textContent = FRUIT_EMOJIS[idx] || "?";
            if (elapsed < duration){
              requestAnimationFrame(frame);
            } else {
              resolve();
            }
          }
          frame();
        });
      }

      spinBtn.addEventListener('click', async function (){
        spinBtn.disabled = true;
        result.textContent = '';
        await animateReel(1200);
        const picked = pickRandomFruitKey();
        // show final emoji and name
        const pickedEmoji = PRODUCTS[picked] ? PRODUCTS[picked].emoji : '?';
        reel.textContent = pickedEmoji;
        result.textContent = `Added ${PRODUCTS[picked] ? PRODUCTS[picked].name : picked} to basket.`;
        // Add to basket (this will update indicator via patched window.addToBasket)
        addToBasket(picked);
        spinBtn.disabled = false;
      });
    </script>
  </body>
</html>
