<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Complete Your Order - Fruit Shop</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header role="banner">
      <div class="header-center">
        <a href="index.html" class="logo" aria-label="Go to homepage">
          <img
            src="img/fruit-shop-logo.png"
            class="logo-img"
            alt="Fruit Shop Logo"
          />
          <span class="products-text"> View Products </span>
        </a>
        <nav role="navigation" aria-label="Main navigation">
          <a
            href="basket.html"
            class="basket-link"
            aria-label="View shopping basket"
          >
            <img
              src="img/basket-icon.png"
              class="basket-img"
              alt="Shopping basket icon"
            />
            <span class="basket-text">View shopping basket</span>
          </a>
        </nav>
      </div>
    </header>
    <main id="main-content" role="main">
      <div class="content-box">
        <h1>Checkout</h1>
        <form id="checkoutForm" role="form" aria-label="Checkout form">
          <div class="form-group">
            <label for="name">Name:</label>
            <input
              type="text"
              id="name"
              name="name"
              required
              aria-required="true"
              aria-label="Enter your full name"
            />
          </div>
          <div class="form-group">
            <label for="address">Address:</label>
            <input
              type="text"
              id="address"
              name="address"
              required
              aria-required="true"
              aria-label="Enter your delivery address"
            />
          </div>
          <button
            type="submit"
            class="cart-action-btn"
            aria-label="Place order"
          >
            Place Order
          </button>
        </form>
        <div id="successMsg" role="alert" aria-live="polite" style="display:none">
          Thank you for your order!
        </div>
        <div id="errorMsg" role="alert" aria-live="assertive" style="display:none;color:#c00;margin-top:8px"></div>
      </div>
    </main>
    <footer>
      <a
        href="https://www.linkedin.com/in/timlolkema/"
        target="_blank"
        rel="noopener noreferrer"
      >
        By Tim Lolkema
      </a>
    </footer>
    <script src="shop.js"></script>
    <script>
      renderBasket();
      document.getElementById("checkoutForm").onsubmit = function (e) {
        e.preventDefault();
        var address = document.getElementById("address").value.trim();
        // only letters and numbers allowed in each part, format: xxx@yyy.zzz
        var re = /^[A-Za-z0-9]+@[A-Za-z0-9]+\.[A-Za-z0-9]+$/;
        var errorEl = document.getElementById("errorMsg");
        var successEl = document.getElementById("successMsg");
        if (!re.test(address)) {
          errorEl.style.display = "block";
          errorEl.textContent = "ERR_INVALID_EMAIL_FORMAT: Address must be in the format xxx@yyy.zzz (letters and numbers only).";
          successEl.style.display = "none";
          return false;
        }
        // valid
        errorEl.style.display = "none";
        successEl.style.display = "block";
        document.getElementById("checkoutForm").style.display = "none";
        clearBasket();
        renderBasket();
      };
    </script>
  </body>
</html>
